name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (integration on Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bos
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bos
          POSTGRES_PASSWORD: bos
          POSTGRES_DB: bos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Point the suite at real Postgres so it exercises FOR UPDATE locking and
      # pg_trgm for real (spec §10 "against a real test database").
      BOS_DATABASE_URL: postgresql+psycopg://bos:bos@localhost:5432/bos_test
      BOS_JWT_SECRET: ci-only-secret-please-override-in-production-000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Validate migrations apply on Postgres
        run: alembic upgrade head
      - name: Tests
        run: pytest -q

  tablet:
    name: Tablet (typecheck + smoke tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bos/tablet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Order-flow smoke tests
        run: npm test

  web:
    name: Web dashboard (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bos/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Build (runs tsc)
        run: npm run build

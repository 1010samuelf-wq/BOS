services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bos
      POSTGRES_PASSWORD: bos
      POSTGRES_DB: bos
    ports:
      - "5432:5432"
    volumes:
      - bos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bos"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      BOS_DATABASE_URL: postgresql+psycopg://bos:bos@db:5432/bos
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  bos_pgdata:

server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for any client-side route (React Router).
    # index.html must be revalidated every visit so a new deploy's asset hashes
    # are picked up immediately (no stale cached app after an update).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Content-hashed bundles never change — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PWA manifest — nginx's default type isn't right; browsers want this one.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }
}

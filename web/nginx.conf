# WebSocket upgrade plumbing for the /api proxy below.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy the API (and its WebSocket) to the backend app so the whole thing is
    # one origin. Locked-down devices then only need just-cake-dashboard.fly.dev
    # allowlisted — not the separate API domain.
    location /api/ {
        proxy_pass https://just-cake-bakery.fly.dev;
        proxy_ssl_server_name on;
        proxy_set_header Host just-cake-bakery.fly.dev;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # SPA: serve index.html for any client-side route (React Router).
    # index.html must be revalidated every visit so a new deploy's asset hashes
    # are picked up immediately (no stale cached app after an update).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Content-hashed bundles never change — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for any client-side route (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Content-hashed bundles never change — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
